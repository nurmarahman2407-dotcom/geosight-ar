<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Student Dashboard — GeoSight AR</title>
<link rel="stylesheet" href="../css/style.css" />
<style>
  .hub { min-height: 100vh; padding: 40px 20px 60px; max-width: 480px; margin: 0 auto; }
  .top-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .page-title { font-family: var(--font-display); font-weight: 700; font-size: 22px; margin: 0; }

  .panel {
    background: var(--panel-glass); backdrop-filter: blur(14px); border: 1px solid var(--border-glass);
    border-radius: 18px; padding: 18px 20px; margin-bottom: 14px;
  }
  .panel h3 {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--aurora-cyan); margin: 0 0 12px;
  }

  .big-stat { text-align: center; padding: 10px 0; }
  .big-stat b { display: block; font-family: var(--font-mono); font-size: 40px;
    background: var(--aurora-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .big-stat span { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }

  .mission-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; font-family: var(--font-body); font-size: 14px; border-bottom: 1px solid var(--border-glass); }
  .mission-row:last-child { border-bottom: none; }
  .badge-ok { color: var(--success); font-family: var(--font-mono); font-size: 12px; }
  .badge-pending { color: var(--text-dim); font-family: var(--font-mono); font-size: 12px; }

  .stat-grid { display: flex; gap: 10px; }
  .stat-grid .item { flex: 1; text-align: center; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 10px; }
  .stat-grid .item b { display: block; font-family: var(--font-mono); font-size: 18px; color: var(--aurora-cyan); }
  .stat-grid .item span { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); text-transform: uppercase; }

  .loading-msg, .error-msg { text-align: center; font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); padding: 20px; }
  .error-msg { color: var(--error); }

  .action-links { display: flex; flex-direction: column; gap: 8px; margin-top: 6px; }
  .action-link {
    display: flex; align-items: center; justify-content: center; gap: 6px; padding: 12px;
    border-radius: 12px; background: var(--panel-glass-strong); border: 1px solid var(--border-glass);
    text-decoration: none; color: var(--text-light); font-family: var(--font-body); font-size: 13px;
  }
</style>
</head>
<body>

<div class="hub">
  <div class="top-row">
    <a href="../index.html" class="menu-btn">🏠 Menu</a>
    <h1 class="page-title">📊 Student Dashboard</h1>
    <span style="width:38px"></span>
  </div>

  <div id="loading" class="loading-msg">⏳ Loading data from Sheets...</div>
  <div id="error" class="error-msg" style="display:none;"></div>

  <div id="dashboard-content" style="display:none;">

    <div class="panel">
      <div class="big-stat">
        <b id="stat-percent">0%</b>
        <span>Overall Quiz Accuracy</span>
      </div>
    </div>

    <div class="panel">
      <h3>Mission Progress</h3>
      <div id="mission-list"></div>
    </div>

    <div class="panel">
      <h3>Performance Stats</h3>
      <div class="stat-grid">
        <div class="item"><b id="stat-attempts">-</b><span>Attempts</span></div>
        <div class="item"><b id="stat-correct">-</b><span>Correct</span></div>
        <div class="item"><b id="stat-tier">-</b><span>Latest Tier</span></div>
      </div>
    </div>

    <div class="action-links">
      <a href="../reflection/reflection.html" class="action-link">💭 Mission Reflection</a>
      <a href="../challenge/final-challenge.html" class="action-link">🚀 Retake Final Challenge</a>
      <a href="../index.html" class="action-link">🏠 Back to Missions</a>
    </div>

  </div>
</div>

<script src="../js/sheet-connector.js"></script>
<script>
  const studentName = localStorage.getItem("geosight_student_name") || "Guest";
  const shapeOrder = ["cube", "cuboid", "cylinder", "pyramid", "cone", "sphere"];
  const shapeLabels = { cube: "🧊 Cube", cuboid: "📦 Cuboid", cylinder: "🥫 Cylinder", pyramid: "🔺 Pyramid", cone: "🍦 Cone", sphere: "🌐 Sphere" };

  SheetConnector.fetchData(studentName)
    .then((data) => {
      document.getElementById("loading").style.display = "none";
      document.getElementById("dashboard-content").style.display = "block";
      renderDashboard(data);
    })
    .catch((err) => {
      document.getElementById("loading").style.display = "none";
      const errEl = document.getElementById("error");
      errEl.style.display = "block";
      errEl.textContent = "⚠️ " + err.message + " — make sure the Apps Script URL is set in sheet-connector.js";
    });

  function renderDashboard(data) {
    const quizLog = data.quizLog || [];
    const missionLog = data.missionLog || [];
    const certLog = data.certificateLog || [];

    // ── Mission progress: bentuk mana yang ada quiz betul ──
    const completedShapes = new Set(
      quizLog.filter((q) => q.Correct === true || q.Correct === "true" || q.Correct === "TRUE").map((q) => q.Shape)
    );

    const listEl = document.getElementById("mission-list");
    shapeOrder.forEach((shape) => {
      const row = document.createElement("div");
      row.className = "mission-row";
      const done = completedShapes.has(shape);
      row.innerHTML = `<span>${shapeLabels[shape]}</span><span class="${done ? "badge-ok" : "badge-pending"}">${done ? "✓ COMPLETE" : "PENDING"}</span>`;
      listEl.appendChild(row);
    });

    // ── Quiz accuracy ──
    const totalAttempts = quizLog.length;
    const totalCorrect = quizLog.filter((q) => q.Correct === true || q.Correct === "true" || q.Correct === "TRUE").length;
    const percent = totalAttempts > 0 ? Math.round((totalCorrect / totalAttempts) * 100) : 0;

    document.getElementById("stat-percent").textContent = percent + "%";
    document.getElementById("stat-attempts").textContent = totalAttempts;
    document.getElementById("stat-correct").textContent = totalCorrect;

    // ── Latest certificate tier ──
    if (certLog.length > 0) {
      const latest = certLog[certLog.length - 1];
      document.getElementById("stat-tier").textContent = latest.Tier || "-";
    }
  }
</script>

</body>
</html>
